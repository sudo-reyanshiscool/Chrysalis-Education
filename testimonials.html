      <figure class="testimonial reveal">
        <blockquote>
          “My daughter arrived at Chrysalis reluctant to write a sentence. She now
          writes essays with a voice that is unmistakably her own.”
        </blockquote>
        <figcaption>— Parent, Form V</figcaption>
      </figure>
      <figure class="testimonial reveal delay-1">
        <blockquote>
          “The seminars feel like university the way university ought to feel.
          Small, demanding, and entirely unhurried.”
        </blockquote>
        <figcaption>— A-Level Student</figcaption>
      </figure>
      <figure class="testimonial reveal delay-2">
        <blockquote>
          “I credit Chrysalis with the essay that secured my Cambridge offer.
          The attention to revision was unlike anything I had known.”
        </blockquote>
        <figcaption>— University Matriculant, 2024</figcaption>
      </figure>
      <figure class="testimonial reveal">
        <blockquote>
          “The tutors treated my son as a reader, not a test-taker. That
          distinction, small as it sounds, changed everything for him.”
        </blockquote>
        <figcaption>— Parent, IGCSE</figcaption>
      </figure>
      <figure class="testimonial reveal delay-1">
        <blockquote>
          “I walked in thinking I disliked poetry. I walked out having memorised
          half of Keats's odes, somehow by accident.”
        </blockquote>
        <figcaption>— IB Student</figcaption>
      </figure>
      <figure class="testimonial reveal delay-2">
        <blockquote>
          “They gave my writing an ear. I did not know prose could sound like
          anything until I studied here.”
        </blockquote>
        <figcaption>— Former Student, now reading English at Oxford</figcaption>
      </figure>
