<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chrysalis, A Centre for English Studies</title>
<meta name="description" content="A small studio in New Delhi teaching English literature, composition, and examination preparation." />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap');

  html, body, #root { height: 100%; }
  body { margin: 0; background: #000; }

  .liquid-glass {
    background: rgba(255, 255, 255, 0.01);
    background-blend-mode: luminosity;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    border: none;
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.45) 0%,
      rgba(255, 255, 255, 0.15) 20%,
      rgba(255, 255, 255, 0) 40%,
      rgba(255, 255, 255, 0) 60%,
      rgba(255, 255, 255, 0.15) 80%,
      rgba(255, 255, 255, 0.45) 100%
    );
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }

  /* Hide default focus ring on the email input */
  input:focus { outline: none; }

  /* Chrysalis mark, rendered as a mask so the fill follows currentColor */
  .chrysalis-mark {
    display: inline-block;
    width: 1em;
    height: 1em;
    background-color: currentColor;
    -webkit-mask: url('assets/chrysalis-mark.svg') center / contain no-repeat;
            mask: url('assets/chrysalis-mark.svg') center / contain no-repeat;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useEffect, useRef } = React;

/* ---------- Lucide-style icons (inline SVG, stroke-based) ---------- */
const Icon = ({ children, size = 24, className = "", ...rest }) => (
  <svg
    xmlns="http://www.w3.org/2000/svg"
    width={size}
    height={size}
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    strokeWidth="2"
    strokeLinecap="round"
    strokeLinejoin="round"
    className={className}
    {...rest}
  >
    {children}
  </svg>
);

const Globe = (p) => (
  <Icon {...p}>
    <circle cx="12" cy="12" r="10" />
    <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
    <path d="M2 12h20" />
  </Icon>
);

const PenTool = (p) => (
  <Icon {...p}>
    <path d="m12 19 7-7 3 3-7 7-3-3z" />
    <path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" />
    <path d="m2 2 7.586 7.586" />
    <circle cx="11" cy="11" r="2" />
  </Icon>
);

const Facebook = (p) => (
  <Icon {...p}>
    <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z" />
  </Icon>
);

const Mail = (p) => (
  <Icon {...p}>
    <rect width="20" height="16" x="2" y="4" rx="2" />
    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
  </Icon>
);

const ArrowRight = (p) => (
  <Icon {...p}>
    <path d="M5 12h14" />
    <path d="m12 5 7 7-7 7" />
  </Icon>
);

const Instagram = (p) => (
  <Icon {...p}>
    <rect width="20" height="20" x="2" y="2" rx="5" ry="5" />
    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
    <line x1="17.5" x2="17.51" y1="6.5" y2="6.5" />
  </Icon>
);

const Twitter = (p) => (
  <Icon {...p}>
    <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z" />
  </Icon>
);

/* ---------- Hero with video fade loop ---------- */
function Hero() {
  const videoRef = useRef(null);
  const fadingOutRef = useRef(false);
  const rafRef = useRef(null);

  useEffect(() => {
    const video = videoRef.current;
    if (!video) return;

    const cancelAnim = () => {
      if (rafRef.current != null) {
        cancelAnimationFrame(rafRef.current);
        rafRef.current = null;
      }
    };

    const animateOpacity = (from, to, duration, onDone) => {
      cancelAnim();
      const start = performance.now();
      const tick = (now) => {
        const t = Math.min(1, (now - start) / duration);
        const value = from + (to - from) * t;
        video.style.opacity = String(value);
        if (t < 1) {
          rafRef.current = requestAnimationFrame(tick);
        } else {
          rafRef.current = null;
          if (onDone) onDone();
        }
      };
      rafRef.current = requestAnimationFrame(tick);
    };

    const fadeIn = () => {
      const current = parseFloat(video.style.opacity || "0");
      fadingOutRef.current = false;
      animateOpacity(current, 1, 500);
    };

    const fadeOut = () => {
      const current = parseFloat(video.style.opacity || "1");
      animateOpacity(current, 0, 500);
    };

    const handleLoaded = () => {
      video.style.opacity = "0";
      const playPromise = video.play();
      if (playPromise && typeof playPromise.catch === "function") {
        playPromise.catch(() => {});
      }
      fadeIn();
    };

    const handleTimeUpdate = () => {
      if (!video.duration || isNaN(video.duration)) return;
      const remaining = video.duration - video.currentTime;
      if (remaining <= 0.55 && !fadingOutRef.current) {
        fadingOutRef.current = true;
        fadeOut();
      }
    };

    const handleEnded = () => {
      video.style.opacity = "0";
      cancelAnim();
      setTimeout(() => {
        video.currentTime = 0;
        const p = video.play();
        if (p && typeof p.catch === "function") p.catch(() => {});
        fadeIn();
      }, 100);
    };

    video.style.opacity = "0";
    video.addEventListener("loadeddata", handleLoaded);
    video.addEventListener("timeupdate", handleTimeUpdate);
    video.addEventListener("ended", handleEnded);

    // If already loaded (cached), kick it off
    if (video.readyState >= 2) handleLoaded();

    return () => {
      cancelAnim();
      video.removeEventListener("loadeddata", handleLoaded);
      video.removeEventListener("timeupdate", handleTimeUpdate);
      video.removeEventListener("ended", handleEnded);
    };
  }, []);

  return (
    <div className="relative min-h-screen bg-black overflow-hidden">
      {/* Background video */}
      {/* TODO: replace with Chrysalis hero video */}
      <video
        ref={videoRef}
        className="absolute inset-0 w-full h-full object-cover translate-y-[17%]"
        src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_115001_bcdaa3b4-03de-47e7-ad63-ae3e392c32d4.mp4"
        muted
        autoPlay
        playsInline
        preload="auto"
        style={{ opacity: 0 }}
      />

      {/* Foreground column */}
      <div className="relative z-10 flex flex-col min-h-screen">
        {/* Nav */}
        <nav className="relative z-20 pl-6 pr-6 py-6">
          <div className="rounded-full px-6 py-3 flex items-center justify-between max-w-5xl mx-auto">
            <div className="flex items-center gap-8">
              <div
                className="flex items-center gap-2 text-white text-xl"
                style={{ fontFamily: "'Instrument Serif', serif" }}
              >
                <span
                  className="chrysalis-mark"
                  style={{ width: 28, height: 28 }}
                  aria-hidden="true"
                />
                <span>Chrysalis</span>
              </div>
              <div className="hidden md:flex items-center gap-8">
                {["Programmes", "Faculty", "Enquiries"].map((label) => (
                  <a
                    key={label}
                    href="#"
                    className="text-white/80 hover:text-white transition-colors text-sm font-medium"
                  >
                    {label}
                  </a>
                ))}
              </div>
            </div>
            <div className="flex items-center gap-4">
              <button className="text-white text-sm font-medium">Reading List</button>
              <button className="liquid-glass rounded-full px-6 py-2 text-white text-sm font-medium">
                Enquire
              </button>
            </div>
          </div>
        </nav>

        {/* Hero content */}
        <main className="relative z-10 flex-1 flex flex-col items-center justify-center px-6 py-12 text-center -translate-y-[20%]">
          <h1
            className="text-5xl md:text-6xl lg:text-7xl text-white mb-8 tracking-tight whitespace-nowrap"
            style={{ fontFamily: "'Instrument Serif', serif" }}
          >
            Built for serious readers
          </h1>

          <div className="max-w-xl w-full space-y-4">
            <form
              className="liquid-glass rounded-full pl-6 pr-2 py-2 flex items-center gap-3"
              onSubmit={(e) => e.preventDefault()}
            >
              <input
                type="email"
                placeholder="Your email, to begin"
                className="flex-1 bg-transparent text-white placeholder:text-white/40 text-base border-0"
              />
              <button
                type="submit"
                aria-label="Submit email"
                className="bg-white rounded-full p-3 text-black flex items-center justify-center"
              >
                <ArrowRight size={20} />
              </button>
            </form>

            <p className="text-white text-sm leading-relaxed px-4">
              A small studio in New Delhi teaching English literature,
              composition, and examination preparation. Tell us a little about
              your child, and we will arrange a first conversation. No charge,
              no pressure.
            </p>

            <div className="flex justify-center pt-2">
              <button className="liquid-glass rounded-full px-8 py-3 text-white text-sm font-medium hover:bg-white/5 transition-colors">
                Manifesto
              </button>
            </div>
          </div>
        </main>

        {/* Social icons */}
        <footer className="relative z-10 flex justify-center gap-4 pb-12">
          <button
            aria-label="Instagram"
            className="liquid-glass rounded-full p-4 text-white/80 hover:text-white hover:bg-white/5 transition-all"
          >
            <Instagram size={20} />
          </button>
          <button
            aria-label="Facebook"
            className="liquid-glass rounded-full p-4 text-white/80 hover:text-white hover:bg-white/5 transition-all"
          >
            <Facebook size={20} />
          </button>
          <button
            aria-label="Email us"
            className="liquid-glass rounded-full p-4 text-white/80 hover:text-white hover:bg-white/5 transition-all"
          >
            <Mail size={20} />
          </button>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Hero />);
</script>
</body>
</html>
